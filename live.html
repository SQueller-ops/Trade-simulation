@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap');
`,oy=`
:root{
  --sea:#0E3B3E; --sea-deep:#0A2C2E; --parch:#ECE1C7; --parch2:#E2D3B2;
  --ink:#2C231A; --ink-soft:#5C4B37; --gold:#C8952B; --gold-bright:#E5B143;
  --cinnabar:#9E3B2E; --lapis:#28507A; --line:rgba(44,35,26,.16);
  --display:'IM Fell English SC','EB Garamond',Georgia,serif;
  --serif:'EB Garamond',Georgia,'Times New Roman',serif;
  --mono:'JetBrains Mono',ui-monospace,'Courier New',monospace;
}
*{box-sizing:border-box}
.root{font-family:var(--serif); color:var(--ink); background:var(--sea-deep); min-height:100vh; -webkit-font-smoothing:antialiased;}
.root button{font-family:inherit; cursor:pointer}
h1,h2,h3{margin:0; line-height:1.08}
p{line-height:1.6; margin:.5em 0}
a{color:var(--lapis)}

/* paper texture for panels */
.panel{
  background:
    linear-gradient(135deg, rgba(255,255,255,.18), rgba(0,0,0,.02)),
    var(--parch);
  border:1px solid var(--line);
  border-radius:6px;
  padding:24px 26px;
  box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 10px 30px rgba(0,0,0,.18);
  position:relative;
}
.panel + .panel{margin-top:22px}

.eyebrow{font-family:var(--display); letter-spacing:.14em; text-transform:uppercase;
  font-size:.72rem; color:var(--cinnabar);}
.h-display{font-family:var(--display); font-weight:400; font-size:1.9rem; color:var(--ink); margin-top:2px}
.h-display.sm{font-size:1.35rem}
.muted{color:var(--ink-soft)}
.small{font-size:.85rem}

/* buttons */
.btn{border:1px solid var(--ink); background:transparent; color:var(--ink);
  padding:10px 18px; border-radius:4px; font-size:.95rem; font-weight:500;
  transition:transform .08s ease, background .15s ease;}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none}
.btn.gold{background:var(--gold); border-color:var(--gold-bright); color:#2A1E08; font-weight:600;
  box-shadow:0 4px 14px rgba(200,149,43,.35)}
.btn.gold:hover{background:var(--gold-bright)}
.btn.ghost{border-color:var(--line); background:rgba(255,255,255,.4); color:var(--ink-soft)}
.btn.ghost:hover{color:var(--ink)}
.btn.sm{padding:6px 12px; font-size:.85rem}

/* topbar */
.topbar{display:flex; align-items:center; gap:16px; padding:14px 22px;
  background:linear-gradient(var(--sea), var(--sea-deep)); color:var(--parch);
  border-bottom:2px solid var(--gold); position:sticky; top:0; z-index:30}
.brand{display:flex; align-items:center; gap:8px; background:none; border:none; color:var(--gold-bright)}
.brand-mark{font-size:1.1rem}
.brand-text{font-family:var(--display); letter-spacing:.06em; font-size:1.05rem; color:var(--parch)}
.topbar-title{flex:1; text-align:center; font-family:var(--serif); font-style:italic;
  font-size:1.05rem; color:#E9DDC2; opacity:.92}
.topbar-right{display:flex; gap:8px}
.topbar .btn.ghost{background:rgba(255,255,255,.08); color:#E9DDC2; border-color:rgba(233,221,194,.3)}

/* page wrap */
.page{min-height:100vh; background:radial-gradient(120% 80% at 50% 0%, #134A4C 0%, var(--sea-deep) 70%)}
.wrap{max-width:1080px; margin:0 auto; padding:26px 18px 80px}

/* ---------- HOME ---------- */
.home{min-height:100vh; background:radial-gradient(130% 90% at 50% -10%, #15585A 0%, var(--sea-deep) 65%); display:flex; justify-content:center}
.home-inner{max-width:980px; padding:54px 20px 80px; text-align:center; color:var(--parch)}
.home .eyebrow{color:var(--gold-bright)}
.hero-title{font-family:var(--display); font-size:clamp(2.6rem,7vw,5rem); color:var(--parch);
  letter-spacing:.01em; margin:10px 0 6px; text-shadow:0 2px 20px rgba(0,0,0,.4)}
.hero-title.sm{font-size:clamp(2rem,5vw,3rem); color:var(--ink); text-shadow:none}
.hero-sub{max-width:620px; margin:0 auto; color:#D8E4DC; font-size:1.12rem; line-height:1.65}
.home-map{margin:34px auto 8px; max-width:760px; border:1px solid rgba(229,177,67,.3); border-radius:8px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.4)}
.home-actions{display:grid; grid-template-columns:1fr 1fr; gap:18px; max-width:760px; margin:26px auto 0; text-align:left}
.day-card{display:flex; flex-direction:column; gap:6px; padding:22px; border-radius:8px;
  background:var(--parch); border:1px solid var(--line); color:var(--ink);
  box-shadow:0 10px 30px rgba(0,0,0,.25); transition:transform .12s ease, box-shadow .12s ease}
.day-card:hover{transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,.32)}
.day-card.gold-card{background:linear-gradient(160deg,#F3D98C,#E7B94B); border-color:var(--gold-bright)}
.day-num{font-family:var(--display); letter-spacing:.12em; text-transform:uppercase; font-size:.72rem; color:var(--cinnabar)}
.day-name{font-family:var(--display); font-size:1.5rem}
.day-desc{color:var(--ink-soft); font-size:.95rem; line-height:1.5}
.gold-card .day-desc{color:#5A4413}
.day-go{margin-top:6px; font-weight:600; color:var(--lapis)}
.gold-card .day-go{color:#6A3B12}

/* ---------- MAP ---------- */
.map{width:100%; height:auto; display:block; background:var(--sea-deep)}
.day1-map,.home-map .map{border-radius:6px}
.day1-map{margin:18px 0 4px; border:1px solid var(--line); border-radius:6px; overflow:hidden; background:var(--sea-deep)}
.route-live{animation:flow 1.1s linear infinite}
@keyframes flow{to{stroke-dashoffset:-14}}

/* peek */
.peek{margin-top:14px; padding:16px 18px; background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:6px}
.peek-name{font-family:var(--display); font-size:1.15rem; margin-right:10px}
.peek-sub{color:var(--ink-soft); font-size:.85rem}
.peek-borders{margin:8px 0; font-size:.9rem; color:var(--ink-soft)}
.peek-tag{display:inline-block; background:var(--sea); color:var(--parch); padding:2px 9px; border-radius:20px; font-size:.78rem; margin:2px 4px 2px 0}
.peek-blurb{font-style:italic; color:var(--ink); margin-top:6px}

/* readings */
.readings{display:grid; gap:14px; margin-top:14px}
.reading{padding:0; overflow:hidden; border-top:3px solid var(--gold)}
.reading-head{width:100%; display:flex; align-items:center; gap:12px; padding:14px 18px; background:none; border:none; text-align:left}
.reading-title{font-family:var(--display); font-size:1.15rem; display:block}
.reading-region{font-size:.82rem; color:var(--ink-soft); font-style:italic}
.reading-toggle{margin-left:auto; font-size:1.4rem; color:var(--ink-soft); font-family:var(--mono)}
.reading-body{padding:0 18px 6px; color:var(--ink); line-height:1.65}
.reading-foot{padding:10px 18px; border-top:1px dashed var(--line); font-size:.86rem; color:var(--ink-soft); background:rgba(0,0,0,.02)}

/* chips */
.chip-dot{display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px;
  border-radius:50%; color:#fff; font-size:.85rem; flex:none; box-shadow:0 1px 3px rgba(0,0,0,.25)}
.chip{display:inline-flex; align-items:center; gap:7px; border:1px solid; border-radius:30px;
  padding:3px 11px 3px 4px; background:rgba(255,255,255,.55); margin:3px 5px 3px 0}
.chip .chip-dot{width:20px; height:20px; font-size:.72rem}
.chip-name{font-size:.85rem}
.chip-qty{font-family:var(--mono); font-weight:700; background:var(--ink); color:var(--parch);
  border-radius:20px; padding:0 8px; font-size:.78rem; margin-left:2px}

/* exit */
.exit-q{margin:10px 0; padding-left:22px; line-height:1.6}
.exit-q li{margin:8px 0}
.exit .btn{margin-top:14px}

/* ---------- REGION PICKER ---------- */
.region-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; margin-top:16px}
.region-card{display:flex; flex-direction:column; gap:6px; align-items:flex-start; text-align:left;
  padding:14px 16px; border-radius:8px; background:rgba(255,255,255,.5); border:1px solid var(--line)}
.region-card:hover{border-color:var(--gold)}
.region-card.sel{border-color:var(--gold-bright); background:#FBF0D2; box-shadow:0 0 0 2px var(--gold-bright)}
.rc-circle{font-family:var(--mono); font-weight:700; width:26px; height:26px; border-radius:50%;
  background:var(--sea); color:var(--parch); display:flex; align-items:center; justify-content:center; font-size:.85rem}
.rc-name{font-family:var(--display); font-size:1.05rem; line-height:1.15}
.setup-confirm{margin-top:18px; padding-top:16px; border-top:1px dashed var(--line)}
.setup-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
.team-input{flex:1; min-width:200px; padding:10px 14px; border:1px solid var(--line); border-radius:4px;
  font-family:var(--serif); font-size:1rem; background:#fff}

/* ---------- GEN BAR ---------- */
.genbar{position:sticky; top:53px; z-index:20; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:12px 22px; background:linear-gradient(#1A5557,#123F41); color:var(--parch);
  border-bottom:1px solid rgba(229,177,67,.35)}
.genbar-left{display:flex; flex-direction:column}
.gen-label{font-family:var(--display); letter-spacing:.08em; font-size:1.05rem; color:var(--gold-bright)}
.gen-era{font-size:.82rem; font-style:italic; opacity:.85}
.gen-wealth{margin-left:auto; display:flex; align-items:baseline; gap:8px; background:rgba(0,0,0,.2); padding:6px 16px; border-radius:6px}
.gen-wealth span{font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; opacity:.8}
.gen-wealth b{font-family:var(--mono); font-size:1.5rem; color:var(--gold-bright)}
.genbar-right{display:flex; gap:8px; align-items:center}
.genbar .btn.ghost{background:rgba(255,255,255,.1); color:var(--parch); border-color:rgba(229,221,194,.3)}

/* ---------- DASHBOARD ---------- */
.dash{display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start}
.dash-left{display:flex; flex-direction:column; gap:20px; position:sticky; top:112px}
.inv-list{margin:12px 0; min-height:30px}
.inv-stats{display:flex; gap:10px; border-top:1px dashed var(--line); padding-top:12px}
.inv-stats div{flex:1; text-align:center; font-size:.78rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em}
.inv-stats span{display:block; font-family:var(--mono); font-size:1.4rem; color:var(--ink); font-weight:700}
.minimap .map{border-radius:6px; border:1px solid var(--line); margin-top:8px}
.minimap-tags{margin-top:10px}

/* trade */
.trade-grid{display:grid; grid-template-columns:1fr auto auto 1fr auto; gap:10px; align-items:end; margin-top:12px}
.fld{display:flex; flex-direction:column; gap:4px}
.fld span{font-size:.78rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em}
.fld select,.fld input{padding:9px 10px; border:1px solid var(--line); border-radius:4px; font-family:var(--serif); font-size:.95rem; background:#fff}
.fld.qty input{width:70px; font-family:var(--mono)}
.fld.partner{margin-top:12px}
.swap{font-size:1.4rem; color:var(--cinnabar); padding-bottom:8px}
.trade-actions{display:flex; gap:10px; margin-top:14px}
.flash{margin-top:12px; padding:9px 14px; background:rgba(40,80,122,.12); border-left:3px solid var(--lapis); border-radius:4px; font-size:.9rem}

/* ledger */
.ledger-scroll{overflow-x:auto; margin-top:12px}
.ledger-table{width:100%; border-collapse:collapse; font-size:.9rem; min-width:560px}
.ledger-table th{text-align:left; font-family:var(--display); letter-spacing:.04em; text-transform:uppercase;
  font-size:.72rem; color:var(--cinnabar); padding:8px 10px; border-bottom:2px solid var(--line)}
.ledger-table td{padding:10px; border-bottom:1px solid var(--line); vertical-align:top}
.ledger-table .num{font-family:var(--mono); text-align:right}
.ledger-table .strong{font-weight:700; color:var(--gold); font-size:1.05rem}
.era{font-size:.74rem; color:var(--ink-soft); font-style:italic}
.formula{font-size:.7rem; color:var(--ink-soft); font-family:var(--mono)}
.cellgood{display:block; font-size:.82rem}
.live-row{background:rgba(229,177,67,.12)}
.livetag{font-family:var(--display); font-size:.62rem; background:var(--gold); color:#2A1E08; padding:1px 6px; border-radius:10px; letter-spacing:.08em; text-transform:uppercase}
.formula-note{margin-top:10px; font-size:.8rem; color:var(--ink-soft); font-style:italic}

/* ---------- FINAL ---------- */
.final-hero{text-align:center; background:linear-gradient(160deg,#F4DC93,#E7BA4C); border-color:var(--gold-bright)}
.final-wealth{display:flex; flex-direction:column; align-items:center; margin-top:10px}
.final-wealth span:first-child{font-family:var(--display); letter-spacing:.1em; text-transform:uppercase; font-size:.8rem; color:var(--cinnabar)}
.final-wealth b{font-family:var(--mono); font-size:3.4rem; color:var(--ink); line-height:1}
.candy-table{width:100%; border-collapse:collapse; margin-top:14px}
.candy-table th{text-align:left; font-family:var(--display); text-transform:uppercase; font-size:.72rem; color:var(--cinnabar); padding:8px 10px; border-bottom:2px solid var(--line)}
.candy-table td{padding:10px; border-bottom:1px solid var(--line)}
.candy-table .num{font-family:var(--mono); text-align:right}
.candy-table .strong{font-weight:700; color:var(--ink)}
.candy-totals{margin-top:18px; padding:16px; background:var(--sea); border-radius:8px; color:var(--parch)}
.ct-head{font-family:var(--display); letter-spacing:.1em; text-transform:uppercase; font-size:.78rem; color:var(--gold-bright); margin-bottom:10px}
.ct-grid{display:flex; flex-wrap:wrap; gap:10px}
.ct-pill{background:rgba(255,255,255,.12); border:1px solid rgba(229,177,67,.35); border-radius:30px; padding:8px 16px; font-size:.95rem}
.ct-pill b{font-family:var(--mono); color:var(--gold-bright); font-size:1.1rem; margin-right:4px}
.reflect .btn{margin-top:14px}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(10,28,30,.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
.modal{max-width:560px; width:100%; max-height:86vh; overflow:auto}
.rule-list{margin:12px 0; padding-left:20px; line-height:1.6}
.rule-list li{margin:9px 0}

/* responsive */
@media(max-width:860px){
  .dash{grid-template-columns:1fr}
  .dash-left{position:static}
  .home-actions{grid-template-columns:1fr}
  .trade-grid{grid-template-columns:1fr 1fr; }
  .swap{display:none}
}
*:focus-visible{outline:3px solid var(--gold-bright); outline-offset:2px}
@media(prefers-reduced-motion:reduce){ .route-live{animation:none} .btn:hover{transform:none} .day-card:hover{transform:none} }

/* ===== DAY 1 LESSON ===== */
.panel.sub{background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(0,0,0,.015)),#F1E7D0}
.btn.big{font-size:1.05rem; padding:13px 26px; margin-top:18px}

/* stepper */
.stepper{position:sticky; top:53px; z-index:18; background:linear-gradient(#16504F,#103E40);
  border-bottom:1px solid rgba(229,177,67,.3); display:flex; align-items:center; gap:10px; padding:8px 14px; overflow-x:auto}
.stepper-inner{display:flex; gap:6px; flex:1}
.step-pill{display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.06); border:1px solid rgba(229,221,194,.18);
  color:#D8E4DC; padding:6px 12px; border-radius:30px; white-space:nowrap; font-size:.86rem}
.step-pill:hover{background:rgba(255,255,255,.13)}
.step-pill.active{background:var(--gold); color:#2A1E08; border-color:var(--gold-bright); font-weight:600}
.step-pill.done{color:#BfeBD0}
.step-dot{display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%;
  background:rgba(0,0,0,.25); font-family:var(--mono); font-size:.72rem}
.step-pill.active .step-dot{background:rgba(0,0,0,.18)}
.stepper-name{color:#E9DDC2; font-style:italic; font-size:.85rem; padding-right:6px; white-space:nowrap}

.navrow{display:flex; justify-content:space-between; align-items:center; margin-top:22px}

/* start / agenda / name */
.namecard{margin:16px 0; padding:18px; background:rgba(40,80,122,.08); border:1px solid var(--line); border-radius:8px}
.namecard-h,.agenda-h,.jside-h{font-family:var(--display); letter-spacing:.06em; text-transform:uppercase; font-size:.78rem; color:var(--cinnabar); margin-bottom:10px}
.name-grid{display:grid; grid-template-columns:1fr 1fr auto; gap:12px}
.fld-label{font-size:.78rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:6px}
.fld input,.fld textarea{padding:9px 11px; border:1px solid var(--line); border-radius:4px; font-family:var(--serif); font-size:1rem; background:#fff; width:100%}
.fld.inline{flex-direction:row; align-items:center; gap:10px}
.fld.inline input{width:120px}
.agenda{margin-top:8px; padding:16px 18px; background:rgba(0,0,0,.02); border-left:3px solid var(--gold); border-radius:6px}
.agenda ol{margin:6px 0 0; padding-left:20px; line-height:1.7}

/* do now map + matching */
.dnmap-wrap{margin:16px 0; border:1px solid var(--line); border-radius:8px; overflow:hidden}
.dnmap{width:100%; height:auto; display:block}
.match-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:8px 18px; margin-top:8px}
.match-row{display:flex; align-items:center; gap:10px; padding:6px 10px; border:1px solid var(--line); border-radius:6px; background:rgba(255,255,255,.4)}
.match-row.ok{background:rgba(94,140,90,.16); border-color:#5E8C5A}
.match-row.no{background:rgba(158,59,46,.12); border-color:var(--cinnabar)}
.match-term{flex:1; font-size:.92rem}
.match-row select{width:60px; padding:6px; border:1px solid var(--line); border-radius:4px; font-family:var(--mono); background:#fff}
.match-mark{font-weight:700; width:16px; text-align:center}
.match-row.ok .match-mark{color:#3f6b3c}
.match-row.no .match-mark{color:var(--cinnabar)}
.check-bar{display:flex; align-items:center; gap:14px; margin-top:16px; flex-wrap:wrap}
.score{font-family:var(--display); font-size:1.1rem; color:var(--gold)}

/* vocab */
.vocab-grid{display:flex; flex-direction:column; gap:8px; margin-top:8px}
.vocab-row{display:flex; align-items:center; gap:12px; padding:8px 12px; border:1px solid var(--line); border-radius:6px; background:rgba(255,255,255,.4)}
.vocab-row.ok{background:rgba(94,140,90,.16); border-color:#5E8C5A}
.vocab-row.no{background:rgba(158,59,46,.12); border-color:var(--cinnabar)}
.vocab-term{font-family:var(--display); font-size:1.02rem; min-width:150px; flex:none}
.vocab-row select{flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:4px; font-family:var(--serif); background:#fff; font-size:.9rem}

/* guided notes */
.wordbank{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 16px; padding:14px; background:var(--sea); border-radius:8px}
.bankword{background:rgba(255,255,255,.12); color:var(--parch); border:1px solid rgba(229,177,67,.35); border-radius:20px; padding:4px 12px; font-size:.88rem}
.bankword.used{opacity:.32; text-decoration:line-through}
.notes-body p{line-height:2.1; font-size:1.05rem}
.blank{display:inline-block; border:none; border-bottom:2px solid var(--lapis); background:rgba(40,80,122,.06);
  font-family:var(--serif); font-size:.98rem; color:var(--lapis); padding:2px 6px; margin:0 2px; border-radius:3px 3px 0 0; max-width:200px}
.blank.ok{color:#3f6b3c; border-color:#5E8C5A; background:rgba(94,140,90,.12)}
.blank.no{color:var(--cinnabar); border-color:var(--cinnabar); background:rgba(158,59,46,.1)}

/* source */
.source{margin-top:14px; padding:22px; background:#FBF6E7; border:1px solid var(--line); border-radius:8px;
  box-shadow:inset 0 0 0 1px rgba(200,149,43,.12)}
.source-head{border-bottom:2px solid var(--line); padding-bottom:12px; margin-bottom:14px}
.source-tag{display:inline-block; font-family:var(--display); letter-spacing:.1em; text-transform:uppercase; font-size:.68rem;
  background:var(--cinnabar); color:#fff; padding:2px 10px; border-radius:20px}
.source-title{font-family:var(--display); font-size:1.4rem; margin:8px 0 2px; font-weight:400}
.source-attr{font-size:.82rem; color:var(--ink-soft); font-style:italic}
.source-p{position:relative; padding-left:34px; line-height:1.7; margin:12px 0; font-size:1.02rem}
.lineno{position:absolute; left:0; top:2px; font-family:var(--mono); font-size:.72rem; color:var(--gold);
  border:1px solid var(--line); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center}

/* questions */
.qlist{display:flex; flex-direction:column; gap:16px; margin-top:10px}
.qitem{display:flex; gap:12px}
.qnum{flex:none; width:28px; height:28px; border-radius:50%; background:var(--sea); color:var(--parch);
  display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:.85rem}
.qbody{flex:1}
.qtext{font-size:.98rem; margin-bottom:8px}
.qbody textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:6px; font-family:var(--serif); font-size:.95rem; background:#fff; resize:vertical}
.starter{font-size:.86rem; color:var(--ink-soft); margin-bottom:6px; padding:6px 10px; background:rgba(40,80,122,.07); border-radius:5px}
.mc{display:flex; flex-direction:column; gap:6px}
.mc-opt{display:flex; align-items:center; gap:10px; padding:8px 12px; border:1px solid var(--line); border-radius:6px; background:rgba(255,255,255,.5); cursor:pointer; font-size:.95rem}
.mc-opt:hover{border-color:var(--gold)}
.mc-opt.sel{background:#FBF0D2; border-color:var(--gold-bright); box-shadow:0 0 0 1px var(--gold-bright)}

/* journal */
.jregion{margin:16px 0}
.jregion-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px}
.jr-btn{display:flex; align-items:center; gap:8px; padding:8px 14px; border:1px solid var(--line); border-radius:30px; background:rgba(255,255,255,.5); font-size:.9rem}
.jr-btn:hover{border-color:var(--gold)}
.jr-btn.sel{background:#FBF0D2; border-color:var(--gold-bright); box-shadow:0 0 0 1px var(--gold-bright)}
.jr-btn .rc-circle{width:22px; height:22px; font-size:.78rem}
.jref{margin:6px 0 16px; padding:12px 16px; background:rgba(0,0,0,.025); border-left:3px solid var(--gold); border-radius:6px; font-size:.92rem; line-height:1.5}
.jgrid{display:grid; grid-template-columns:1fr 280px; gap:18px; align-items:start}
.journal-text{width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; font-family:var(--serif); font-size:1.02rem; line-height:1.6; background:#FBF6E7; resize:vertical; margin-top:10px}
.wordcount{text-align:right; font-family:var(--mono); font-size:.82rem; color:var(--ink-soft); margin-top:6px}
.jside{display:flex; flex-direction:column; gap:14px}
.jside-box{padding:14px; background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:8px}
.jcheck{display:flex; align-items:flex-start; gap:8px; font-size:.88rem; margin:7px 0; line-height:1.35}
.jcheck input{margin-top:3px}
.jprogress{margin-top:10px; font-family:var(--display); color:var(--gold); font-size:1rem}
.jstarters{margin:0; padding-left:18px; font-size:.84rem; color:var(--ink-soft); line-height:1.5}
.jstarters li{margin:6px 0}

/* submit */
.warn{padding:12px 16px; background:rgba(158,59,46,.1); border-left:3px solid var(--cinnabar); border-radius:6px; margin:12px 0; font-size:.92rem}
.submit-steps{margin:10px 0; padding-left:22px; line-height:1.8}
.submit-actions{margin:14px 0}
.submit-box{width:100%; padding:14px; border:1px solid var(--line); border-radius:8px; background:#FBF6E7;
  font-family:var(--mono); font-size:.8rem; line-height:1.5; white-space:pre; overflow:auto; resize:vertical}

@media(max-width:760px){
  .name-grid{grid-template-columns:1fr}
  .jgrid{grid-template-columns:1fr}
  .vocab-row{flex-direction:column; align-items:stretch}
  .vocab-term{min-width:0}
  .step-label{display:none}
  .step-pill{padding:6px 9px}
}

/* ===== DAY 2: ZONE MAP, EVENTS, ANIMATIONS ===== */
.zonemap{width:100%; height:auto; display:block; border-radius:6px; border:1px solid var(--line)}
.zone-pulse{animation:zpulse 2.4s ease-out infinite}
@keyframes zpulse{0%{r:34px;opacity:.55}70%{r:48px;opacity:0}100%{opacity:0}}
.caravan{filter:drop-shadow(0 0 4px #FFF2CF)}

/* wealth bump */
.wealth-num{display:inline-block; animation:bump .45s ease}
@keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.35); color:#fff}100%{transform:scale(1)}}

/* trade counter + progress */
.trade-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px}
.trade-counter{display:flex; align-items:center; gap:8px; background:var(--sea); color:var(--parch); border-radius:10px; padding:8px 14px; flex:none}
.tc-num{font-family:var(--mono); font-size:1.8rem; font-weight:700; color:var(--gold-bright); line-height:1}
.tc-lab{font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; line-height:1.05}
.trade-progress{display:flex; align-items:center; gap:8px; margin-top:14px; flex-wrap:wrap}
.tp-dot{width:16px; height:16px; border-radius:50%; border:2px solid var(--line); background:rgba(255,255,255,.4); transition:all .3s ease}
.tp-dot.done{background:var(--gold); border-color:var(--gold-bright); box-shadow:0 0 8px rgba(229,177,67,.6); animation:bump .4s ease}

/* received-good chip pop */
.chip-anim{display:inline-block; animation:chippop .6s cubic-bezier(.2,1.4,.4,1)}
@keyframes chippop{0%{transform:scale(.4) translateY(-8px); opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1); opacity:1}}

/* trade toast */
.trade-toast{display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:14px;
  padding:10px 18px; background:linear-gradient(#1A5557,#123F41); color:var(--parch);
  border:1px solid var(--gold); border-radius:30px; font-family:var(--display); font-size:1.05rem;
  animation:toastin .5s ease, toastfade .5s ease 2.4s forwards}
.tt-give{color:#F0C9C2} .tt-get{color:#CFE8C9} .tt-arrow{color:var(--gold-bright)}
@keyframes toastin{from{transform:translateY(-12px); opacity:0}to{transform:translateY(0); opacity:1}}
@keyframes toastfade{to{opacity:0; height:0; margin:0; padding:0; transform:scale(.95)}}

/* event banner */
.event-banner{max-width:1080px; margin:14px auto 0; padding:14px 18px; display:flex; gap:16px; align-items:center;
  background:linear-gradient(100deg,#2A1414,#3A1E18); border:1px solid #7E3B2E; border-radius:10px; color:#F3E2D6}
.event-banner .ev-emblem{width:46px; height:46px; flex:none; border-radius:50%; background:#0A2C2E center/26px no-repeat; border:2px solid var(--gold)}
.ev-emblem.skull{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.6'><circle cx='12' cy='10' r='7'/><circle cx='9.5' cy='10' r='1.6' fill='%23E5B143'/><circle cx='14.5' cy='10' r='1.6' fill='%23E5B143'/><path d='M10 15 l0 3 M12 15 l0 3.5 M14 15 l0 3 M8 19 h8'/></svg>")}
.ev-emblem.ship{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.6'><path d='M4 15 h16 l-2 4 H6 Z'/><path d='M12 3 v12 M12 5 l6 3 l-6 2 Z'/></svg>")}
.ev-emblem.globe{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.5'><circle cx='12' cy='12' r='9'/><path d='M3 12 h18 M12 3 v18 M5 6.5 q7 4 14 0 M5 17.5 q7 -4 14 0'/></svg>")}
.ev-head{font-size:1.05rem} .ev-years{color:var(--gold-bright); font-style:italic; font-size:.9rem; margin-left:6px}
.ev-rules{margin:6px 0 0; padding-left:18px; font-size:.9rem; line-height:1.5}
.er-restrict{color:#F3B7AD} .er-bonus{color:#BfeAC2}
.ev-tag{font-size:.7rem; color:var(--cinnabar); font-style:italic}
.bonus-tag{font-size:.68rem; color:#3f6b3c; font-weight:700}

/* confirm modal */
.modal.small{max-width:440px}
.confirm-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px}

/* transition overlay */
.trans-bg{position:fixed; inset:0; z-index:300; background:rgba(8,26,28,.86); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadein .3s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.trans-card{max-width:560px; width:100%; text-align:center; animation:riseup .5s cubic-bezier(.2,1,.3,1)}
@keyframes riseup{from{transform:translateY(24px) scale(.96); opacity:0}to{transform:translateY(0) scale(1); opacity:1}}
.trans-seal{width:54px; height:54px; margin:0 auto 10px; border-radius:50%; background:var(--gold); color:#2A1E08;
  display:flex; align-items:center; justify-content:center; font-size:1.6rem; box-shadow:0 0 0 6px rgba(200,149,43,.2)}
.trans-emblem{width:80px; height:80px; margin:14px auto 6px; border-radius:50%; background:#0A2C2E center/46px no-repeat; border:3px solid var(--gold)}
.trans-emblem.skull{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.5'><circle cx='12' cy='10' r='7'/><circle cx='9.5' cy='10' r='1.6' fill='%23E5B143'/><circle cx='14.5' cy='10' r='1.6' fill='%23E5B143'/><path d='M10 15 l0 3 M12 15 l0 3.5 M14 15 l0 3 M8 19 h8'/></svg>")}
.trans-emblem.ship{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.5'><path d='M4 15 h16 l-2 4 H6 Z'/><path d='M12 3 v12 M12 5 l6 3 l-6 2 Z'/></svg>")}
.trans-emblem.globe{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.4'><circle cx='12' cy='12' r='9'/><path d='M3 12 h18 M12 3 v18 M5 6.5 q7 4 14 0 M5 17.5 q7 -4 14 0'/></svg>")}
.grant-note{margin:14px 0 4px; padding:11px 16px; background:rgba(200,149,43,.16); border:1px solid var(--gold);
  border-radius:8px; font-size:.95rem; color:var(--ink)}
.grant-good{font-weight:600}
.rc-good.g4{color:var(--lapis)} .rc-good.g4 i{font-size:.78rem}
.ev-years.big{color:var(--cinnabar); font-style:italic; font-family:var(--display)}
.trans-summary{color:var(--ink-soft); line-height:1.6}
.trans-rules{display:flex; flex-direction:column; gap:8px; margin:16px 0; text-align:left}
.trans-rule{padding:10px 14px; border-radius:8px; font-size:.95rem; display:flex; gap:10px; align-items:flex-start}
.trans-rule.er-restrict{background:rgba(158,59,46,.12); border-left:3px solid var(--cinnabar); color:var(--ink)}
.trans-rule.er-bonus{background:rgba(94,140,90,.14); border-left:3px solid #5E8C5A; color:var(--ink)}
.tr-icon{font-size:1.1rem}

/* final bonuses */
.final-bonuses{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px}
.fb-pill{background:rgba(94,140,90,.18); border:1px solid #5E8C5A; border-radius:20px; padding:4px 14px; font-size:.85rem; color:#2f5630}

@media(max-width:860px){ .event-banner{margin:14px 16px 0} }
@media(prefers-reduced-motion:reduce){
  .zone-pulse,.wealth-num,.tp-dot.done,.chip-anim,.trade-toast,.trans-card,.trans-bg,.caravan{animation:none !important}
}

/* reference chart in Rules */
.modal.wide{max-width:780px}
.chart-scroll{overflow-x:auto; margin-top:10px}
.ref-chart{width:100%; border-collapse:collapse; font-size:.86rem; min-width:620px}
.ref-chart th{text-align:left; font-family:var(--display); text-transform:uppercase; letter-spacing:.04em;
  font-size:.68rem; color:var(--cinnabar); padding:8px 10px; border-bottom:2px solid var(--line)}
.ref-chart td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top}
.rc-good{display:flex; align-items:center; gap:6px; white-space:nowrap; margin:2px 0}
.rc-dot{width:11px; height:11px; border-radius:50%; flex:none; box-shadow:0 1px 2px rgba(0,0,0,.3)}
.rc-candy{display:block; font-family:var(--mono); font-size:.78rem; color:var(--ink-soft); margin:2px 0}
.rc-explore{color:var(--lapis); font-style:italic; font-size:.8rem}

/* new sea-route highlight */
.peek-tag.new-route{background:var(--lapis); color:#fff; box-shadow:0 0 0 2px rgba(40,80,122,.3)}

/* ambient map animations */
.shimmer path{animation:shim 3.5s ease-in-out infinite}
@keyframes shim{0%,100%{opacity:.15}50%{opacity:.5}}
.compass{transform-box:fill-box; transform-origin:center}
.compass-star{transform-box:fill-box; transform-origin:center; animation:spin 36s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.zone-bob{animation:bob 5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.caravel-amb{filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
@media(prefers-reduced-motion:reduce){
  .shimmer path,.compass-star,.zone-bob{animation:none !important}
}

.page.center{display:flex;align-items:center;justify-content:center;padding:24px}
.landing{max-width:880px;text-align:center;color:var(--parch);padding:40px 20px}
.landing .hero-sub{max-width:600px;margin:0 auto 8px;color:#D8E4DC;font-size:1.1rem}
.landing-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:680px;margin:28px auto 0}
.big-card{display:flex;flex-direction:column;gap:8px;padding:26px;border-radius:10px;background:var(--parch);border:1px solid var(--line);color:var(--ink);text-align:left;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.big-card:hover{transform:translateY(-3px)}
.big-card.gold-card{background:linear-gradient(160deg,#F3D98C,#E7B94B);border-color:var(--gold-bright)}
.bc-title{font-family:var(--display);font-size:1.5rem}
.bc-desc{color:var(--ink-soft);font-size:.95rem}
.gold-card .bc-desc{color:#5A4413}
.setup-list{line-height:1.8;margin:10px 0;padding-left:22px}
.code-input{width:100%;text-align:center;font-family:var(--mono);font-size:2.2rem;letter-spacing:.4em;padding:14px;border:2px solid var(--line);border-radius:10px;background:#fff;text-transform:uppercase}
.team-input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:6px;font-family:var(--serif);font-size:1rem;background:#fff}
.warn{margin-top:12px;padding:10px 14px;background:rgba(158,59,46,.1);border-left:3px solid var(--cinnabar);border-radius:6px;font-size:.92rem}

.hostbar{display:flex;align-items:center;gap:16px;padding:12px 22px;background:linear-gradient(var(--sea),var(--sea-deep));color:var(--parch);border-bottom:2px solid var(--gold)}
.hb-code{display:flex;flex-direction:column;line-height:1}
.hb-code span{font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;opacity:.7}
.hb-code b{font-family:var(--mono);font-size:1.5rem;color:var(--gold-bright);letter-spacing:.18em}
.hb-mid{flex:1;text-align:center}
.hb-gen{font-family:var(--display);font-size:1.3rem;color:var(--gold-bright);margin-right:10px}
.hb-era{font-style:italic;opacity:.85}

.lobby{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;align-items:center}
.join-url{font-family:var(--mono);background:var(--sea);color:var(--parch);padding:8px 14px;border-radius:6px;display:inline-block;margin:8px 0;font-size:.95rem;word-break:break-all}
.big-code{font-family:var(--mono);font-size:4.5rem;letter-spacing:.3em;color:var(--gold);font-weight:700;margin:6px 0}
.lobby-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slot{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px;border:1px dashed var(--line);border-radius:10px;background:rgba(255,255,255,.4);opacity:.6}
.slot.filled{opacity:1;border-style:solid;background:#FBF0D2}
.slot-medal{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;border:2px solid #fff}
.slot-medal.big{width:60px;height:60px;font-size:1.4rem;margin:0 auto 8px}
.slot-region{font-family:var(--display);font-size:.95rem}
.slot-team{font-size:.85rem;color:var(--ink-soft)}

.host-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.host-left,.host-right{display:flex;flex-direction:column;gap:16px}
.estrip{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(100deg,#2A1414,#3A1E18);border:1px solid #7E3B2E;border-radius:10px;color:#F3E2D6;font-size:.95rem}
.estrip.none{background:rgba(255,255,255,.08);border-color:var(--line);color:var(--parch);justify-content:center}
.estrip-emblem{width:34px;height:34px;flex:none;border-radius:50%;background:#0A2C2E center/20px no-repeat;border:2px solid var(--gold)}
.estrip-emblem.skull{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.6'><circle cx='12' cy='10' r='7'/><circle cx='9.5' cy='10' r='1.6' fill='%23E5B143'/><circle cx='14.5' cy='10' r='1.6' fill='%23E5B143'/><path d='M10 15v3 M12 15v3.5 M14 15v3 M8 19h8'/></svg>")}
.estrip-emblem.ship{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.6'><path d='M4 15h16l-2 4H6Z'/><path d='M12 3v12 M12 5l6 3l-6 2Z'/></svg>")}
.estrip-emblem.globe{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E5B143' stroke-width='1.5'><circle cx='12' cy='12' r='9'/><path d='M3 12h18 M12 3v18 M5 6.5q7 4 14 0 M5 17.5q7 -4 14 0'/></svg>")}

.leaderboard{display:flex;flex-direction:column;gap:8px}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.45);transition:all .4s ease}
.lb-row.lead{background:linear-gradient(100deg,#FBF0D2,#F5E3B0);border-color:var(--gold-bright);box-shadow:0 0 0 1px var(--gold-bright)}
.lb-rank{font-family:var(--display);font-size:1.3rem;width:24px;color:var(--ink-soft)}
.lb-row.lead .lb-rank{color:var(--gold)}
.lb-medal{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:700;flex:none}
.lb-name{flex:1;font-family:var(--display);font-size:1.05rem;display:flex;flex-direction:column;line-height:1.1}
.lb-region{font-size:.72rem;color:var(--ink-soft);font-style:italic;font-family:var(--serif)}
.lb-prog{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft)}
.lb-wealth{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--gold);min-width:54px;text-align:right}
.host-controls{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
.btn.pulse{animation:pulse 1.3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 14px rgba(200,149,43,.35)}50%{box-shadow:0 4px 24px rgba(229,177,67,.8)}}

.waitbox,.waitdots{text-align:center}
.waitbox{padding:18px;background:rgba(40,80,122,.08);border-radius:8px;color:var(--ink-soft);font-style:italic}
.waitdots{display:flex;gap:8px;justify-content:center;margin-top:16px}
.waitdots span{width:12px;height:12px;border-radius:50%;background:var(--gold);animation:wd 1.2s ease-in-out infinite}
.waitdots span:nth-child(2){animation-delay:.2s}.waitdots span:nth-child(3){animation-delay:.4s}
@keyframes wd{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
.ct-mini{display:inline-block;background:rgba(0,0,0,.05);border-radius:14px;padding:2px 9px;margin:2px;font-size:.82rem}
.peek-tag.new-route{background:var(--lapis);color:#fff}
@media(max-width:880px){.lobby{grid-template-columns:1fr}.host-grid{grid-template-columns:1fr}.landing-cards{grid-template-columns:1fr}.big-code{font-size:3rem}}
@media(prefers-reduced-motion:reduce){.btn.pulse,.waitdots span,.wealth-num{animation:none}}
